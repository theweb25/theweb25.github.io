<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotus Sync Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .btn-primary { background: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .btn-primary:active { transform: scale(0.98); }
        .slider { appearance: none; height: 4px; background: #1e293b; border-radius: 2px; outline: none; }
        .slider::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; cursor: pointer; border: 2px solid white; }
        .hidden { display: none !important; }
        
        #target-dot {
            width: 32px; height: 32px;
            background: rgba(59, 130, 246, 0.15);
            border: 2px dashed #3b82f6;
            border-radius: 8px;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            cursor: move;
            z-index: 100;
            pointer-events: auto;
        }

        .input-dark {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            padding: 8px;
            font-family: monospace;
            font-size: 11px;
        }

        .toggle-btn { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; color: #64748b; }
        .toggle-btn.active { background: #3b82f6; border-color: #60a5fa; color: white; }
        
        /* Pulse for audio activity */
        .audio-bar { width: 4px; background: #3b82f6; border-radius: 2px; transition: height 0.1s ease; }
    </style>
</head>
<body class="p-4 pb-20">
    <div class="max-w-md mx-auto space-y-4">
        
        <header class="flex justify-between items-center py-2">
            <div>
                <h1 class="text-2xl font-black tracking-tighter italic uppercase text-white">Lotus<span class="text-blue-500">Sync</span></h1>
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em]">Universal Mirror v9.0</p>
            </div>
            <div class="flex gap-2 items-center">
                <button id="unmute-btn" class="px-3 py-1 bg-red-500/20 text-red-400 border border-red-500/30 rounded-lg text-[9px] font-bold uppercase tracking-widest hidden">Unmute Audio</button>
                <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-700 border-2 border-white/10"></div>
            </div>
        </header>

        <div id="setup-panel" class="glass rounded-[2rem] p-6 text-center">
            <p class="text-slate-400 text-xs mb-4">Connect your BLE strip to begin</p>
            <button id="scanBtn" class="btn-primary w-full py-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all">
                Connect LED Hardware
            </button>
        </div>

        <div id="main-ui" class="hidden space-y-4">
            <!-- Source Selector -->
            <div class="flex gap-2 p-1 glass rounded-2xl">
                <button id="src-video" class="toggle-btn active flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-[0.1em]">File</button>
                <button id="src-yt" class="toggle-btn flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-[0.1em]">YouTube</button>
                <button id="src-screen" class="toggle-btn flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-[0.1em]">Screen</button>
            </div>

            <!-- Player Area -->
            <div class="glass rounded-[2rem] p-3 relative">
                <div id="video-wrapper" class="aspect-video bg-black rounded-[1.5rem] overflow-hidden relative border border-white/5">
                    <video id="v" class="w-full h-full object-contain" playsinline autoplay crossorigin="anonymous" controls></video>
                    <div id="yt-player" class="absolute inset-0 hidden"></div>
                    <video id="screen-v" class="w-full h-full object-contain hidden" playsinline autoplay></video>
                    <div id="target-dot"></div>
                </div>

                <div id="file-controls" class="mt-3 flex justify-center">
                   <button onclick="document.getElementById('fileIn').click()" class="text-[9px] font-black text-slate-500 uppercase tracking-widest hover:text-blue-400">Choose Video File</button>
                </div>
                
                <div id="yt-controls" class="mt-3 hidden space-y-2">
                    <div class="flex gap-2">
                        <input type="text" id="yt-url" placeholder="Paste YouTube Link..." class="input-dark flex-1">
                        <button id="load-yt" class="bg-blue-600 px-4 rounded-lg text-[10px] font-bold uppercase">Load</button>
                    </div>
                </div>

                <input type="file" id="fileIn" class="hidden" accept="video/*">
            </div>

            <!-- Metrics -->
            <div class="flex gap-2 text-[9px] font-black uppercase tracking-widest text-slate-500 px-2">
                <div class="glass flex-1 p-2 rounded-xl flex justify-between items-center">
                    <span>Signal</span>
                    <span id="fps-val" class="text-emerald-400">0 FPS</span>
                </div>
                <div class="glass flex-1 p-2 rounded-xl flex justify-between items-center gap-2">
                    <span>Audio</span>
                    <div class="flex gap-0.5 items-end h-3">
                        <div id="a-bar-1" class="audio-bar h-1"></div>
                        <div id="a-bar-2" class="audio-bar h-2"></div>
                        <div id="a-bar-3" class="audio-bar h-1"></div>
                    </div>
                </div>
            </div>

            <!-- Settings -->
            <div class="glass rounded-[2rem] p-6 space-y-6">
                <div class="space-y-6">
                    <div class="space-y-3">
                        <div class="flex justify-between text-[10px] font-bold uppercase">
                            <span>Smooth Transition</span>
                            <span id="smooth-val" class="text-blue-400">0.15</span>
                        </div>
                        <input type="range" id="smooth-slider" min="0.01" max="0.5" step="0.01" value="0.15" class="slider w-full">
                    </div>

                    <div class="space-y-3">
                        <div class="flex justify-between text-[10px] font-bold uppercase">
                            <span>Color Boost</span>
                            <span id="boost-val" class="text-blue-400">1.0x</span>
                        </div>
                        <input type="range" id="boost-slider" min="1" max="10" step="0.1" value="1" class="slider w-full">
                    </div>
                </div>
            </div>

            <!-- Output Preview -->
            <div class="glass rounded-[2rem] p-5 flex items-center gap-5 border-l-4 border-blue-500">
                <div id="color-prev" class="w-14 h-14 rounded-2xl shadow-xl border border-white/10"></div>
                <div>
                    <p id="hex-code" class="text-xl font-mono font-black text-white">#000000</p>
                    <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Active LED Output</p>
                </div>
            </div>
        </div>

        <div id="log" class="text-[8px] font-mono text-slate-500 bg-black/20 p-4 rounded-2xl h-20 overflow-y-auto border border-white/5 whitespace-pre-wrap"></div>
    </div>

    <canvas id="c" width="64" height="64" class="hidden"></canvas>

    <script>
        // --- Web Worker Background Heartbeat ---
        const blob = new Blob([`
            let interval;
            self.onmessage = function(e) {
                if (e.data === 'start') {
                    interval = setInterval(() => self.postMessage('tick'), 16);
                } else if (e.data === 'stop') {
                    clearInterval(interval);
                }
            };
        `], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));

        const state = { 
            char: null, lastTime: 0, boost: 1.0, 
            frameCount: 0, fpsLastTime: Date.now(),
            targetX: 0.5, targetY: 0.5,
            currentRGB: { r: 0, g: 0, b: 0 },
            targetRGB: { r: 0, g: 0, b: 0 },
            smoothing: 0.15,
            screenStream: null,
            ytPlayer: null,
            currentSource: 'file'
        };

        const logger = (m, type='info') => {
            const el = document.getElementById('log');
            el.innerHTML += `<div class="${type==='error'?'text-red-400':'text-slate-500'}">> ${m}</div>`;
            el.scrollTop = el.scrollHeight;
        };

        function lerp(start, end, amt) { return start + (end - start) * amt; }

        // --- YouTube Setup ---
        window.onYouTubeIframeAPIReady = () => {
            state.ytPlayer = new YT.Player('yt-player', {
                height: '100%', width: '100%',
                playerVars: { 'autoplay': 1, 'controls': 1, 'mute': 0 },
                events: {
                    'onReady': (e) => {
                        logger("YouTube Engine Ready");
                        document.getElementById('unmute-btn').classList.remove('hidden');
                    }
                }
            });
        };

        document.getElementById('unmute-btn').onclick = () => {
            if(state.ytPlayer) state.ytPlayer.unMute();
            v.muted = false;
            document.getElementById('unmute-btn').classList.add('hidden');
            logger("Audio system unmuted");
        };

        const v = document.getElementById('v');
        const sv = document.getElementById('screen-v');
        const ytDiv = document.getElementById('yt-player');
        
        const btnSrcVideo = document.getElementById('src-video');
        const btnSrcYT = document.getElementById('src-yt');
        const btnSrcScreen = document.getElementById('src-screen');

        function hideAll() {
            [v, sv, ytDiv].forEach(el => el.classList.add('hidden'));
            [document.getElementById('file-controls'), document.getElementById('yt-controls')].forEach(el => el.classList.add('hidden'));
            [btnSrcVideo, btnSrcYT, btnSrcScreen].forEach(b => b.classList.remove('active'));
            if (state.screenStream) {
                state.screenStream.getTracks().forEach(t => t.stop());
                state.screenStream = null;
            }
        }

        btnSrcVideo.onclick = () => { hideAll(); btnSrcVideo.classList.add('active'); document.getElementById('file-controls').classList.remove('hidden'); v.classList.remove('hidden'); state.currentSource = 'file'; };
        btnSrcYT.onclick = () => { hideAll(); btnSrcYT.classList.add('active'); document.getElementById('yt-controls').classList.remove('hidden'); ytDiv.classList.remove('hidden'); state.currentSource = 'yt'; };
        btnSrcScreen.onclick = async () => {
            try {
                // Request both video AND audio for screen mirroring
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                hideAll();
                state.screenStream = stream;
                sv.srcObject = stream;
                sv.classList.remove('hidden');
                btnSrcScreen.classList.add('active');
                state.currentSource = 'screen';
                logger("Screen + Audio mirror active.");
            } catch (err) { logger("Mirror failed", "error"); }
        };

        document.getElementById('load-yt').onclick = () => {
            const url = document.getElementById('yt-url').value;
            let id = url.match(/(?:youtu\.be\/|youtube\.com\/(?:v\/|u\/\w\/|embed\/|watch\?v=))([^#\&\?]*)/)?.[1];
            if(id && state.ytPlayer) {
                state.ytPlayer.loadVideoById(id);
                if(!state.screenStream) btnSrcScreen.click();
            }
        };

        // --- Draggable Target ---
        const dot = document.getElementById('target-dot');
        const wrapper = document.getElementById('video-wrapper');
        let isDragging = false;
        const moveDot = (e) => {
            if (!isDragging) return;
            const rect = wrapper.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            state.targetX = Math.max(0.05, Math.min(0.95, (cx - rect.left) / rect.width));
            state.targetY = Math.max(0.05, Math.min(0.95, (cy - rect.top) / rect.height));
            dot.style.left = (state.targetX * 100) + '%';
            dot.style.top = (state.targetY * 100) + '%';
        };
        dot.onmousedown = (e) => { isDragging = true; e.preventDefault(); };
        dot.ontouchstart = () => isDragging = true;
        window.onmouseup = window.ontouchend = () => isDragging = false;
        window.onmousemove = window.ontouchmove = moveDot;

        // --- BLE ---
        document.getElementById('scanBtn').onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [0xFFD0, 0xFFF0] });
                const server = await device.gatt.connect();
                const services = await server.getPrimaryServices();
                for (const s of services) {
                    const chars = await s.getCharacteristics();
                    for (const c of chars) { if (c.uuid.includes('ffd5') || c.uuid.includes('fff3')) { state.char = c; break; } }
                    if (state.char) break;
                }
                if (state.char) {
                    document.getElementById('setup-panel').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                    document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-blue-500 shadow-[0_0_10px_#3b82f6]";
                    worker.postMessage('start');
                }
            } catch (err) { logger(err.message, "error"); }
        };

        // --- Engine Logic ---
        const ctx = document.getElementById('c').getContext('2d', { willReadFrequently: true });
        document.getElementById('fileIn').onchange = (e) => { if(e.target.files[0]) { v.src = URL.createObjectURL(e.target.files[0]); v.play(); } };
        document.getElementById('smooth-slider').oninput = (e) => { state.smoothing = parseFloat(e.target.value); document.getElementById('smooth-val').textContent = state.smoothing.toFixed(2); };
        document.getElementById('boost-slider').oninput = (e) => { state.boost = parseFloat(e.target.value); document.getElementById('boost-val').textContent = state.boost.toFixed(1) + 'x'; };

        worker.onmessage = (e) => { if (e.data === 'tick') processFrame(); };

        function processFrame() {
            let el = (state.currentSource === 'file') ? v : sv;

            if (el && el.readyState >= 2) {
                // Visual sampling
                ctx.drawImage(el, Math.floor(state.targetX * (el.videoWidth - 10)), Math.floor(state.targetY * (el.videoHeight - 10)), 10, 10, 0, 0, 1, 1);
                const p = ctx.getImageData(0, 0, 1, 1).data;
                state.targetRGB = { r: p[0], g: p[1], b: p[2] };
                
                state.currentRGB.r = lerp(state.currentRGB.r, state.targetRGB.r, state.smoothing);
                state.currentRGB.g = lerp(state.currentRGB.g, state.targetRGB.g, state.smoothing);
                state.currentRGB.b = lerp(state.currentRGB.b, state.targetRGB.b, state.smoothing);

                let r = Math.min(255, state.currentRGB.r * state.boost);
                let g = Math.min(255, state.currentRGB.g * state.boost);
                let b = Math.min(255, state.currentRGB.b * state.boost);

                const hex = "#" + ((1 << 24) + (Math.round(r) << 16) + (Math.round(g) << 8) + Math.round(b)).toString(16).slice(1).toUpperCase();
                
                if (document.visibilityState === 'visible') {
                    document.getElementById('color-prev').style.backgroundColor = hex;
                    document.getElementById('hex-code').textContent = hex;
                    state.frameCount++;
                    const now = Date.now();
                    if (now - state.fpsLastTime >= 1000) {
                        document.getElementById('fps-val').textContent = state.frameCount + " FPS";
                        state.frameCount = 0; state.fpsLastTime = now;
                    }
                }

                if (state.char && Date.now() - state.lastTime > 16) {
                    const packet = new Uint8Array([0x7e, 0x07, 0x05, 0x03, Math.round(r), Math.round(g), Math.round(b), 0x10, 0xef]);
                    state.char.writeValue(packet).catch(() => {});
                    state.lastTime = Date.now();
                }
            }
        }
    </script>
</body>
</html>
