<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotus Sync Universal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .btn-primary:active { transform: scale(0.96); opacity: 0.9; }
        .slideIn { animation: slideIn 0.4s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6 pb-20">
    <div class="max-w-md mx-auto space-y-6">
        
        <header class="flex justify-between items-center py-2">
            <div>
                <h1 class="text-2xl font-black tracking-tighter italic uppercase text-white">Lotus<span class="text-blue-500">Sync</span></h1>
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em]">Aggressive Detect v3.6</p>
            </div>
            <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-700 border-2 border-white/10"></div>
        </header>

        <!-- Setup Panel -->
        <div id="setup-panel" class="glass rounded-[2.5rem] p-6 space-y-6">
            <div class="flex justify-between items-center px-1">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Device Connection</span>
                <span id="dev-status" class="text-[9px] font-bold text-blue-400 px-2 py-0.5 bg-blue-400/10 rounded-full">WAITING</span>
            </div>

            <button id="scanBtn" class="btn-primary w-full py-5 rounded-3xl font-black text-xs uppercase tracking-widest transition-all">
                Connect to LED
            </button>
        </div>

        <!-- Sync Control (Shown when connected) -->
        <div id="sync-ctrl" class="hidden glass rounded-[2.5rem] p-6 space-y-6 slideIn">
            <div class="aspect-video bg-black rounded-3xl overflow-hidden relative border border-white/5 shadow-2xl">
                <video id="v" class="w-full h-full object-cover" playsinline crossorigin="anonymous"></video>
                <div id="upload-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/90 cursor-pointer">
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2">Tap to Load Movie</p>
                    <input type="file" id="fileIn" class="hidden" accept="video/*">
                </div>
            </div>
            
            <div class="flex items-center gap-6 bg-white/5 p-5 rounded-3xl border border-white/5">
                <div id="color-prev" class="w-16 h-16 rounded-2xl shadow-lg border border-white/10 transition-colors duration-100"></div>
                <div>
                    <p id="hex-code" class="text-2xl font-mono font-black tracking-tighter text-white">#000000</p>
                    <p class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">Sync Active</p>
                </div>
            </div>
        </div>

        <!-- Debug Log -->
        <div class="space-y-2">
            <p class="text-[10px] font-black text-slate-500 uppercase px-2">System Output</p>
            <div id="log" class="text-[9px] font-mono text-slate-400 bg-black/40 p-4 rounded-2xl h-48 overflow-y-auto border border-white/5 whitespace-pre-wrap leading-relaxed"></div>
        </div>
    </div>

    <canvas id="c" width="4" height="4" class="hidden"></canvas>

    <script>
        const state = { char: null, lastTime: 0 };
        const logger = (m, type='info') => {
            const el = document.getElementById('log');
            const color = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-emerald-400' : 'text-slate-400');
            el.innerHTML += `<div class="${color}">> ${m}</div>`;
            el.scrollTop = el.scrollHeight;
        };

        // Try to find ANY writeable characteristic
        async function aggressiveFind(server) {
            logger("Scanning all available services...");
            const services = await server.getPrimaryServices();
            
            for (const service of services) {
                logger(`Checking Service: ${service.uuid}`);
                const chars = await service.getCharacteristics();
                for (const char of chars) {
                    logger(`- Found Char: ${char.uuid}`);
                    // 0xFFD5 and 0xFFF3 are the most common write ports for these LEDs
                    if (char.uuid.includes('ffd5') || char.uuid.includes('fff3')) {
                        logger(`MATCH FOUND: ${char.uuid}`, "success");
                        return char;
                    }
                }
            }
            return null;
        }

        document.getElementById('scanBtn').onclick = async () => {
            logger("Requesting device access...");
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [0xFFD0, 0xFFF0, "0000ffd0-0000-1000-8000-00805f9b34fb", "0000fff0-0000-1000-8000-00805f9b34fb"]
                });

                logger(`Authorized: ${device.name}`, "success");
                const server = await device.gatt.connect();
                logger("GATT Server Connected.");
                
                state.char = await aggressiveFind(server);

                if (state.char) {
                    logger("SWITCHING UI...", "success");
                    document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";
                    document.getElementById('setup-panel').style.display = 'none';
                    document.getElementById('sync-ctrl').classList.remove('hidden');
                } else {
                    logger("Couldn't find the correct control characteristic.", "error");
                }

            } catch (e) {
                logger("Error: " + e.message, "error");
            }
        };

        const v = document.getElementById('v');
        const overlay = document.getElementById('upload-overlay');
        const fileIn = document.getElementById('fileIn');
        const ctx = document.getElementById('c').getContext('2d');

        overlay.onclick = () => fileIn.click();
        fileIn.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                v.src = URL.createObjectURL(file);
                overlay.style.display = 'none';
                v.play();
            }
        };

        async function frameLoop() {
            if(!v.paused && state.char) {
                ctx.drawImage(v, 0, 0, 4, 4);
                const p = ctx.getImageData(0,0,4,4).data;
                let r=0, g=0, b=0;
                for(let i=0; i<p.length; i+=4) { r+=p[i]; g+=p[i+1]; b+=p[i+2]; }
                r=Math.floor(r/16); g=Math.floor(g/16); b=Math.floor(b/16);

                const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
                document.getElementById('color-prev').style.backgroundColor = hex;
                document.getElementById('hex-code').textContent = hex;

                const now = Date.now();
                if(now - state.lastTime > 200) { 
                    try {
                        const packet = new Uint8Array([0x7e, 0x07, 0x05, 0x03, r, g, b, 0x10, 0xef]);
                        await state.char.writeValue(packet);
                        state.lastTime = now;
                    } catch(e) {}
                }
            }
            requestAnimationFrame(frameLoop);
        }
        frameLoop();
    </script>
</body>
</html>
