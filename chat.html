<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotus Sync Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .btn-primary { background: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .btn-primary:active { transform: scale(0.98); }
        .slider { appearance: none; height: 4px; background: #1e293b; border-radius: 2px; outline: none; }
        .slider::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; cursor: pointer; border: 2px solid white; }
        .hidden { display: none !important; }
        
        #target-dot {
            width: 24px; height: 24px;
            background: rgba(239, 68, 68, 0.8);
            border: 3px solid white;
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            cursor: move;
            z-index: 50;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
            pointer-events: auto;
        }

        .input-dark {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            padding: 8px;
            font-family: monospace;
            font-size: 11px;
        }

        .toggle-btn { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; color: #64748b; }
        .toggle-btn.active { background: #3b82f6; border-color: #60a5fa; color: white; }
    </style>
</head>
<body class="p-4 pb-20">
    <div class="max-w-md mx-auto space-y-4">
        
        <header class="flex justify-between items-center py-2">
            <div>
                <h1 class="text-2xl font-black tracking-tighter italic uppercase text-white">Lotus<span class="text-blue-500">Sync</span></h1>
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em]">Universal Mirror v7.0</p>
            </div>
            <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-700 border-2 border-white/10"></div>
        </header>

        <div id="setup-panel" class="glass rounded-[2rem] p-6">
            <button id="scanBtn" class="btn-primary w-full py-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all">
                Connect LED Hardware
            </button>
        </div>

        <div id="main-ui" class="hidden space-y-4">
            <!-- Source Selector -->
            <div class="flex gap-2 p-1 glass rounded-2xl">
                <button id="src-video" class="toggle-btn active flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-[0.1em]">File</button>
                <button id="src-yt" class="toggle-btn flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-[0.1em]">YouTube</button>
                <button id="src-screen" class="toggle-btn flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-[0.1em]">Mirror</button>
            </div>

            <!-- Video Player Area -->
            <div class="glass rounded-[2rem] p-3 relative">
                <div id="video-wrapper" class="aspect-video bg-black rounded-[1.5rem] overflow-hidden relative border border-white/5">
                    <video id="v" class="w-full h-full object-contain pointer-events-none" playsinline autoplay muted crossorigin="anonymous" controls></video>
                    <div id="target-dot"></div>
                </div>

                <!-- Source Inputs -->
                <div id="file-controls" class="mt-3 flex justify-center">
                   <button onclick="document.getElementById('fileIn').click()" class="text-[9px] font-black text-slate-500 uppercase tracking-widest hover:text-blue-400">Choose Video File</button>
                </div>
                
                <div id="yt-controls" class="mt-3 hidden space-y-2">
                    <div class="flex gap-2">
                        <input type="text" id="yt-url" placeholder="Paste YouTube Link..." class="input-dark flex-1">
                        <button id="load-yt" class="bg-blue-600 px-4 rounded-lg text-[10px] font-bold uppercase">Load</button>
                    </div>
                    <p class="text-[8px] text-center text-slate-500 italic">Uses open proxy to enable color sampling</p>
                </div>

                <input type="file" id="fileIn" class="hidden" accept="video/*">
            </div>

            <div class="flex gap-2 text-[9px] font-black uppercase tracking-widest text-slate-500 px-2">
                <div class="glass flex-1 p-2 rounded-xl flex justify-between">
                    <span>Engine</span>
                    <span id="fps-val" class="text-emerald-400">0 FPS</span>
                </div>
                <div class="glass flex-1 p-2 rounded-xl flex justify-between items-center">
                    <span>Background</span>
                    <div id="bg-indicator" class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_5px_#10b981]"></div>
                </div>
            </div>

            <!-- Processing Settings -->
            <div class="glass rounded-[2rem] p-6 space-y-6">
                <div class="flex justify-between items-center">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Processing Engine</h3>
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] text-slate-500 uppercase font-bold">Hz:</span>
                        <input type="number" id="fps-input" value="60" min="1" max="120" class="input-dark w-12 !p-1 text-center">
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="space-y-3">
                        <p class="text-[10px] font-bold uppercase text-slate-400">Sync Mode</p>
                        <div class="flex gap-2">
                            <button id="mode-dot" class="toggle-btn active flex-1 py-3 rounded-xl text-[10px] font-black uppercase">Dot Target</button>
                            <button id="mode-avg" class="toggle-btn flex-1 py-3 rounded-xl text-[10px] font-black uppercase">Average Area</button>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <div class="flex justify-between text-[10px] font-bold uppercase">
                            <span>Smoothing (Lag)</span>
                            <span id="smooth-val" class="text-blue-400">0.15</span>
                        </div>
                        <input type="range" id="smooth-slider" min="0.01" max="1.0" step="0.01" value="0.15" class="slider w-full">
                    </div>

                    <div class="space-y-3">
                        <div class="flex justify-between text-[10px] font-bold uppercase">
                            <span>Brightness Boost</span>
                            <span id="boost-val" class="text-blue-400">1.0x</span>
                        </div>
                        <input type="range" id="boost-slider" min="1" max="8" step="0.1" value="1" class="slider w-full">
                    </div>
                </div>
            </div>

            <!-- Preview Card -->
            <div class="glass rounded-[2rem] p-5 flex items-center gap-5 border-l-4 border-blue-500">
                <div id="color-prev" class="w-14 h-14 rounded-2xl shadow-xl border border-white/10"></div>
                <div>
                    <p id="hex-code" class="text-xl font-mono font-black text-white">#000000</p>
                    <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Hardware Preview</p>
                </div>
            </div>
        </div>

        <div id="log" class="text-[8px] font-mono text-slate-500 bg-black/20 p-4 rounded-2xl h-20 overflow-y-auto border border-white/5 whitespace-pre-wrap"></div>
    </div>

    <canvas id="c" width="64" height="64" class="hidden"></canvas>

    <script>
        const state = { 
            char: null, lastTime: 0, boost: 1.0, 
            targetFPS: 60, frameCount: 0, fpsLastTime: Date.now(),
            targetX: 0.5, targetY: 0.5, syncMode: 'dot',
            currentRGB: { r: 0, g: 0, b: 0 },
            targetRGB: { r: 0, g: 0, b: 0 },
            smoothing: 0.15,
            screenStream: null,
            loopId: null
        };

        const logger = (m, type='info') => {
            const el = document.getElementById('log');
            el.innerHTML += `<div class="${type==='error'?'text-red-400':'text-slate-500'}">> ${m}</div>`;
            el.scrollTop = el.scrollHeight;
        };

        function lerp(start, end, amt) { return start + (end - start) * amt; }

        function startEngine() {
            if (state.loopId) clearInterval(state.loopId);
            state.loopId = setInterval(processFrame, 1000 / 60); 
        }

        // --- Source Logic ---
        const v = document.getElementById('v');
        const btnSrcVideo = document.getElementById('src-video');
        const btnSrcYT = document.getElementById('src-yt');
        const btnSrcScreen = document.getElementById('src-screen');
        
        const fileCtrl = document.getElementById('file-controls');
        const ytCtrl = document.getElementById('yt-controls');

        function hideAllSources() {
            [fileCtrl, ytCtrl].forEach(el => el.classList.add('hidden'));
            [btnSrcVideo, btnSrcYT, btnSrcScreen].forEach(b => b.classList.remove('active'));
            if (state.screenStream) {
                state.screenStream.getTracks().forEach(t => t.stop());
                state.screenStream = null;
            }
            v.src = "";
            v.srcObject = null;
        }

        btnSrcVideo.onclick = () => { hideAllSources(); btnSrcVideo.classList.add('active'); fileCtrl.classList.remove('hidden'); };
        
        btnSrcYT.onclick = () => { hideAllSources(); btnSrcYT.classList.add('active'); ytCtrl.classList.remove('hidden'); };

        btnSrcScreen.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                hideAllSources();
                state.screenStream = stream;
                v.srcObject = stream;
                btnSrcScreen.classList.add('active');
                logger("Mirror active.");
            } catch (err) { logger("Mirroring failed", "error"); }
        };

        document.getElementById('load-yt').onclick = () => {
            const url = document.getElementById('yt-url').value;
            let vidId = "";
            if(url.includes('v=')) vidId = url.split('v=')[1].split('&')[0];
            else if(url.includes('be/')) vidId = url.split('be/')[1].split('?')[0];

            if(vidId) {
                // Use a public invidious instance as a proxy to allow canvas sampling
                const proxyUrl = `https://invidious.snopyta.org/latest_version?id=${vidId}&itag=22`;
                v.src = proxyUrl;
                v.load();
                v.play().catch(e => logger("Proxy Load Failed: " + e.message, "error"));
                logger(`Loading YT ID: ${vidId}`);
            } else {
                logger("Invalid YouTube URL", "error");
            }
        };

        // --- Controls ---
        document.getElementById('fps-input').onchange = (e) => state.targetFPS = Math.min(120, Math.max(1, parseInt(e.target.value) || 60));
        document.getElementById('smooth-slider').oninput = (e) => {
            state.smoothing = parseFloat(e.target.value);
            document.getElementById('smooth-val').textContent = state.smoothing.toFixed(2);
        };
        document.getElementById('boost-slider').oninput = (e) => {
            state.boost = parseFloat(e.target.value);
            document.getElementById('boost-val').textContent = state.boost.toFixed(1) + 'x';
        };

        const btnDot = document.getElementById('mode-dot');
        const btnAvg = document.getElementById('mode-avg');
        btnDot.onclick = () => { state.syncMode = 'dot'; btnDot.classList.add('active'); btnAvg.classList.remove('active'); document.getElementById('target-dot').classList.remove('hidden'); };
        btnAvg.onclick = () => { state.syncMode = 'average'; btnAvg.classList.add('active'); btnDot.classList.remove('active'); document.getElementById('target-dot').classList.add('hidden'); };

        // --- Draggable ---
        const dot = document.getElementById('target-dot');
        const wrapper = document.getElementById('video-wrapper');
        let isDragging = false;
        const moveDot = (e) => {
            if (!isDragging || state.syncMode !== 'dot') return;
            const rect = wrapper.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            state.targetX = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            state.targetY = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
            dot.style.left = (state.targetX * 100) + '%';
            dot.style.top = (state.targetY * 100) + '%';
        };
        dot.onmousedown = (e) => { isDragging = true; e.preventDefault(); };
        dot.ontouchstart = (e) => { isDragging = true; };
        window.onmouseup = window.ontouchend = () => isDragging = false;
        window.onmousemove = window.ontouchmove = moveDot;

        // --- BLE ---
        document.getElementById('scanBtn').onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [0xFFD0, 0xFFF0] });
                const server = await device.gatt.connect();
                const services = await server.getPrimaryServices();
                for (const s of services) {
                    const chars = await s.getCharacteristics();
                    for (const c of chars) { if (c.uuid.includes('ffd5') || c.uuid.includes('fff3')) { state.char = c; break; } }
                    if (state.char) break;
                }
                if (state.char) {
                    document.getElementById('setup-panel').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                    document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-blue-500 shadow-[0_0_10px_#3b82f6]";
                    startEngine();
                }
            } catch (err) { logger(err.message, "error"); }
        };

        document.getElementById('fileIn').onchange = (e) => { if(e.target.files[0]) { v.src = URL.createObjectURL(e.target.files[0]); v.play(); } };

        const ctx = document.getElementById('c').getContext('2d', { willReadFrequently: true });
        
        function processFrame() {
            if (v.readyState >= 2 && !v.paused && !v.ended) {
                if (state.syncMode === 'dot') {
                    ctx.drawImage(v, 0, 0, 64, 64);
                    const p = ctx.getImageData(Math.floor(state.targetX * 63), Math.floor(state.targetY * 63), 1, 1).data;
                    state.targetRGB = { r: p[0], g: p[1], b: p[2] };
                } else {
                    ctx.drawImage(v, 0, 0, 8, 8);
                    const p = ctx.getImageData(0, 0, 8, 8).data;
                    let tr=0, tg=0, tb=0;
                    for(let i=0; i<p.length; i+=4) { tr += p[i]; tg += p[i+1]; tb += p[i+2]; }
                    state.targetRGB = { r: tr/64, g: tg/64, b: tb/64 };
                }
                
                state.currentRGB.r = lerp(state.currentRGB.r, state.targetRGB.r, state.smoothing);
                state.currentRGB.g = lerp(state.currentRGB.g, state.targetRGB.g, state.smoothing);
                state.currentRGB.b = lerp(state.currentRGB.b, state.targetRGB.b, state.smoothing);

                // Refined Luminance Boost
                let r = state.currentRGB.r * state.boost;
                let g = state.currentRGB.g * state.boost;
                let b = state.currentRGB.b * state.boost;

                const hex = "#" + ((1 << 24) + (Math.round(Math.min(255,r)) << 16) + (Math.round(Math.min(255,g)) << 8) + Math.round(Math.min(255,b))).toString(16).slice(1).toUpperCase();
                
                if (document.visibilityState === 'visible') {
                    document.getElementById('color-prev').style.backgroundColor = hex;
                    document.getElementById('hex-code').textContent = hex;
                    state.frameCount++;
                    const now = Date.now();
                    if (now - state.fpsLastTime >= 1000) {
                        document.getElementById('fps-val').textContent = state.frameCount + " FPS";
                        state.frameCount = 0;
                        state.fpsLastTime = now;
                    }
                }

                const now = Date.now();
                if (state.char && now - state.lastTime > (1000 / state.targetFPS)) {
                    const packet = new Uint8Array([0x7e, 0x07, 0x05, 0x03, Math.round(Math.min(255,r)), Math.round(Math.min(255,g)), Math.round(Math.min(255,b)), 0x10, 0xef]);
                    state.char.writeValue(packet).catch(() => {});
                    state.lastTime = now;
                }
            }
        }
    </script>
</body>
</html>
