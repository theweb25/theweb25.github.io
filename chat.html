<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotus Sync Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .device-card { transition: all 0.2s; border: 1px solid rgba(59, 130, 246, 0.2); }
        .device-card:active { transform: scale(0.98); background: rgba(59, 130, 246, 0.1); }
        .status-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto space-y-6">
        
        <!-- Dashboard Header -->
        <div class="flex justify-between items-center bg-blue-900/20 p-5 rounded-[2rem] border border-blue-500/20">
            <div>
                <h1 class="font-black italic text-2xl tracking-tighter text-white">LOTUS<span class="text-blue-500">SYNC</span></h1>
                <p id="env-status" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Checking Browser...</p>
            </div>
            <div id="dot" class="w-3 h-3 bg-red-500 rounded-full border-2 border-white/10"></div>
        </div>

        <!-- The Picker UI -->
        <div class="glass rounded-[2.5rem] p-6 space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Device Dashboard</h2>
                <span id="count" class="text-[9px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full font-bold">0 PAIRED</span>
            </div>

            <div id="pickerList" class="space-y-3 min-h-[120px] flex flex-col justify-center border-y border-white/5 py-4">
                <div id="empty" class="text-center text-xs text-slate-500 italic py-4">
                    Tap below to search for your LEDs
                </div>
            </div>

            <button id="addBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-3xl font-black uppercase tracking-widest text-xs transition-all active:scale-95 shadow-lg shadow-blue-600/20">
                + Search for Device
            </button>
        </div>

        <!-- Sync Interface (Hidden) -->
        <div id="syncUI" class="hidden glass rounded-[2.5rem] p-6 space-y-6 animate-in slide-in-from-bottom-8">
            <div class="aspect-video bg-black rounded-3xl overflow-hidden relative border border-white/5 shadow-2xl">
                <video id="v" class="w-full h-full" playsinline crossorigin="anonymous"></video>
                <div id="drop" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/80 cursor-pointer">
                    <div class="w-12 h-12 bg-blue-600/20 rounded-full flex items-center justify-center mb-3">
                        <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-width="2"></path></svg>
                    </div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tap to load movie</span>
                </div>
                <input type="file" id="fi" class="hidden" accept="video/*">
            </div>

            <div class="flex items-center gap-6 p-2">
                <div id="preview" class="w-16 h-16 rounded-2xl border border-white/10 shadow-xl"></div>
                <div>
                    <p id="hex" class="text-2xl font-black font-mono tracking-tighter">#000000</p>
                    <p class="text-[9px] text-slate-500 font-bold uppercase">Syncing to LEDs</p>
                </div>
            </div>
        </div>

        <!-- Status Log -->
        <div id="log" class="bg-black/40 p-4 rounded-2xl font-mono text-[9px] text-slate-600 h-24 overflow-y-auto border border-white/5">
            > App Ready. Use Bluefy browser.
        </div>
    </div>

    <canvas id="c" width="5" height="5" style="display:none"></canvas>

    <script>
        let ledChar = null;
        const log = (m, e=false) => {
            const d = document.createElement('div');
            if(e) d.className = "text-red-500";
            d.textContent = `> ${m}`;
            document.getElementById('log').appendChild(d);
            document.getElementById('log').scrollTop = 9999;
        };

        window.onload = () => {
            if(!navigator.bluetooth) {
                document.getElementById('env-status').textContent = "INCOMPATIBLE BROWSER";
                log("Error: Current browser does not support Bluetooth.", true);
            } else {
                document.getElementById('env-status').textContent = "BLE ENVIRONMENT OK";
                log("Environment validated. Ready for pairing.");
            }
        };

        document.getElementById('addBtn').onclick = async () => {
            log("Opening System Selector...");
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [0xFFD0, 0xFFF0]
                });

                log(`Paired with ${device.name || 'LED'}`);
                
                // Update In-App Picker UI
                document.getElementById('empty').style.display = 'none';
                document.getElementById('count').textContent = "1 PAIRED";
                const card = document.createElement('div');
                card.className = "device-card glass p-4 rounded-2xl flex items-center justify-between cursor-pointer";
                card.innerHTML = `<div><p class="text-xs font-bold">${device.name || 'Lotus LED'}</p><p class="text-[8px] text-slate-500">READY TO CONNECT</p></div><span class="text-[10px] font-bold text-blue-500">TAP TO SYNC</span>`;
                
                card.onclick = async () => {
                    log("Connecting GATT...");
                    const server = await device.gatt.connect();
                    const service = await server.getPrimaryService(0xFFD0);
                    ledChar = await service.getCharacteristic(0xFFD5);
                    
                    log("CONNECTION SUCCESS", "text-emerald-400");
                    document.getElementById('dot').className = "w-3 h-3 bg-emerald-500 rounded-full status-glow";
                    document.getElementById('syncUI').classList.remove('hidden');
                };

                document.getElementById('pickerList').appendChild(card);

            } catch (err) {
                log(err.message, true);
            }
        };

        // Sync Logic
        const v = document.getElementById('v');
        const fi = document.getElementById('fi');
        const drop = document.getElementById('drop');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d', {willReadFrequently: true});

        drop.onclick = () => fi.click();
        fi.onchange = (e) => {
            const file = e.target.files[0];
            if(file) { v.src = URL.createObjectURL(file); drop.style.display='none'; v.play(); }
        };

        async function loop() {
            if(!v.paused && ledChar) {
                ctx.drawImage(v, 0, 0, 5, 5);
                const p = ctx.getImageData(0,0,5,5).data;
                let r=0, g=0, b=0;
                for(let i=0; i<p.length; i+=4) { r+=p[i]; g+=p[i+1]; b+=p[i+2]; }
                r = Math.floor(r/25); g = Math.floor(g/25); b = Math.floor(b/25);
                
                const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
                document.getElementById('preview').style.backgroundColor = hex;
                document.getElementById('hex').textContent = hex;

                try {
                    await ledChar.writeValue(new Uint8Array([0x7e, 0x07, 0x05, 0x03, r, g, b, 0x10, 0xef]));
                } catch(e) {}
            }
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
